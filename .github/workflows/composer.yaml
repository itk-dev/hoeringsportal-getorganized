### ### Composer
###
### Validates composer.json and checks that it's normalized.
###
### #### Assumptions
###
### 1. A docker compose service named `phpfpm` can be run and `composer` can be
###    run inside the `phpfpm` service.
### 2. [ergebnis/composer-normalize](https://github.com/ergebnis/composer-normalize)
###    is a dev requirement in `composer.json`:
###
###    ``` shell
###    docker compose run --rm phpfpm composer require --dev ergebnis/composer-normalize
###    ```
###
###    Normalize `composer.json` by running
###
###    ``` shell
###    docker compose run --rm phpfpm composer normalize
###    ```

name: Composer

env:
  COMPOSE_USER: runner
  # https://getcomposer.org/doc/03-cli.md#composer-auth
  COMPOSER_AUTH: >-
    {
        "bearer": {
            "www.setasign.com": "${{ secrets.COMPOSER_AUTH_SETASIGN_BEARER }}"
        }
    }

on:
  pull_request:
    paths: &paths
      - "composer.json"
      - "composer.lock"
      - "docker-compose.yml"
  push:
    branches:
      - main
      - develop
    paths: *paths

jobs:
  composer-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Create docker network
        run: |
          docker network create frontend

      - run: |
          docker compose run --rm phpfpm composer validate --strict

  composer-normalized:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Create docker network
        run: |
          docker network create frontend

      - run: |
          docker compose run --rm phpfpm composer install
          docker compose run --rm phpfpm composer normalize --dry-run

  composer-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Create docker network
        run: |
          docker network create frontend

      - run: |
          docker compose run --rm phpfpm composer audit --locked
